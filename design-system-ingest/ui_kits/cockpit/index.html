<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CortexOS · Cockpit</title>
<link rel="icon" href="../../assets/favicon.svg">
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--mv-background);color:var(--mv-ivory);font-family:var(--font-sans);font-weight:300;min-height:100vh}

  /* Shell grid */
  .mv-shell{display:grid;grid-template-columns:288px 1fr 380px;min-height:100vh;transition:grid-template-columns .5s cubic-bezier(.16,1,.3,1)}
  .mv-shell-collapsed{grid-template-columns:80px 1fr 380px}
  .mv-main{display:flex;flex-direction:column;min-width:0;background:
    radial-gradient(600px 400px at 20% 10%,rgba(189,235,52,.06),transparent 50%),
    radial-gradient(500px 350px at 80% 80%,rgba(168,148,255,.05),transparent 50%),
    var(--mv-background);overflow:hidden}

  /* Shared primitives */
  .mv-pill{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;border:1px solid rgba(189,235,52,.2);background:rgba(189,235,52,.05)}
  .mv-dot{width:6px;height:6px;border-radius:50%;background:var(--mv-primary);animation:mv-pulse 2s ease-in-out infinite;flex-shrink:0}
  @keyframes mv-pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .mv-mono-label{font-family:var(--font-mono);font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--mv-primary)}
  .mv-mono-meta{font-family:var(--font-mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(250,252,232,.4)}
  .mv-status-pill{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;border:1px solid rgba(189,235,52,.2);background:rgba(189,235,52,.05)}
  .mv-icon-btn{width:32px;height:32px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:rgba(255,255,255,.6);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
  .mv-icon-btn:hover{background:rgba(255,255,255,.06);color:var(--mv-ivory)}

  /* BrandHeader */
  .mv-brand-header{display:flex;align-items:center;justify-content:space-between;padding:20px 32px;border-bottom:1px solid rgba(255,255,255,.05);backdrop-filter:blur(20px);background:rgba(10,10,15,.6);position:sticky;top:0;z-index:10}
  .mv-bh-left{display:flex;align-items:center;gap:16px}
  .mv-bh-mark{width:40px;height:40px;border-radius:10px}
  .mv-bh-right{display:flex;align-items:center;gap:20px}
  .mv-model-switch{display:flex;gap:4px;padding:4px;border-radius:999px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
  .mv-model-pill{padding:6px 14px;border-radius:999px;background:transparent;border:none;color:rgba(255,255,255,.5);font-family:var(--font-mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .2s}
  .mv-model-pill:hover{color:var(--mv-ivory)}
  .mv-model-active{background:var(--mv-primary);color:#000!important;box-shadow:0 0 20px rgba(189,235,52,.3)}

  /* Sidebar */
  .mv-sidebar{background:var(--mv-surface);border-right:1px solid rgba(255,255,255,.05);padding:24px 16px;display:flex;flex-direction:column;gap:20px;position:relative;overflow:hidden}
  .mv-sb-top{display:flex;justify-content:flex-end}
  .mv-sb-toggle{width:32px;height:32px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:rgba(255,255,255,.6);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
  .mv-sb-toggle:hover{color:var(--mv-primary);border-color:rgba(189,235,52,.3)}
  .mv-sb-nav{display:flex;flex-direction:column;gap:4px}
  .mv-sb-item{display:flex;align-items:center;gap:14px;padding:11px 12px;border-radius:12px;background:transparent;border:1px solid transparent;color:rgba(255,255,255,.55);font-family:var(--font-sans);font-weight:300;font-size:13px;cursor:pointer;transition:all .2s;text-align:left}
  .mv-sb-item:hover{background:rgba(255,255,255,.03);color:var(--mv-ivory)}
  .mv-sb-active{background:rgba(189,235,52,.06)!important;border-color:rgba(189,235,52,.18)!important;color:var(--mv-primary)!important}
  .mv-sb-collapsed .mv-sb-item{justify-content:center;padding:11px}
  .mv-sb-assets{margin-top:8px;padding-top:16px;border-top:1px solid rgba(255,255,255,.05);display:flex;flex-direction:column;gap:6px}
  .mv-sb-asset{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;font-size:12px;color:rgba(255,255,255,.6);cursor:pointer;transition:background .2s}
  .mv-sb-asset:hover{background:rgba(255,255,255,.03)}
  .mv-sb-asset-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  .mv-sb-foot{margin-top:auto;display:flex;flex-direction:column;gap:10px;padding-top:12px;border-top:1px solid rgba(255,255,255,.05)}

  /* Workspace */
  .mv-workspace{flex:1;overflow-y:auto;padding:40px 44px;display:flex;flex-direction:column;gap:44px}
  .mv-page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap}
  .mv-page-title{font-family:var(--font-serif);font-weight:400;font-size:clamp(2.2rem,4vw,3.2rem);line-height:.95;letter-spacing:-.03em;color:var(--mv-ivory);margin:0}
  .mv-page-title em{font-style:italic;font-weight:300;color:var(--mv-primary);opacity:.75}
  .mv-page-kpis{display:flex;gap:32px}
  .mv-kpi-lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(250,252,232,.4)}
  .mv-kpi-val{font-family:var(--font-serif);font-size:28px;color:var(--mv-ivory);line-height:1;margin-top:4px}
  .mv-kpi-val em{font-style:italic;color:var(--mv-primary);opacity:.8}

  /* Nexus */
  .mv-nexus{display:flex;flex-direction:column;gap:24px}
  .mv-nexus-head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap}
  .mv-nexus-title{font-family:var(--font-serif);font-weight:400;font-size:28px;letter-spacing:-.02em;color:var(--mv-ivory);margin:6px 0 0}
  .mv-nexus-title em{font-style:italic;font-weight:300;color:var(--mv-primary);opacity:.7}
  .mv-nexus-principle{font-family:var(--font-serif);font-style:italic;font-size:14px;color:rgba(250,252,232,.55);padding:10px 16px;border:1px solid rgba(189,235,52,.2);background:rgba(189,235,52,.05);border-radius:999px}
  .mv-nexus-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  @media(max-width:1200px){.mv-nexus-grid{grid-template-columns:1fr}}
  .mv-nexus-card{position:relative;padding:22px;border-radius:22px;border:1px solid;backdrop-filter:blur(20px)}
  .mv-nexus-violet{background:rgba(168,148,255,.06);border-color:rgba(168,148,255,.22);box-shadow:0 0 40px rgba(168,148,255,.1)}
  .mv-nexus-teal{background:rgba(78,205,196,.06);border-color:rgba(78,205,196,.22);box-shadow:0 0 40px rgba(78,205,196,.1)}
  .mv-nexus-rose{background:rgba(255,107,157,.06);border-color:rgba(255,107,157,.22);box-shadow:0 0 40px rgba(255,107,157,.1)}
  .mv-nexus-row{display:flex;align-items:center;gap:16px;margin-bottom:18px}
  .mv-nexus-sym{font-family:var(--font-serif);font-size:34px;line-height:1;opacity:.85}
  .mv-nexus-violet .mv-nexus-sym{color:#a894ff}
  .mv-nexus-teal .mv-nexus-sym{color:#4ecdc4}
  .mv-nexus-rose .mv-nexus-sym{color:#ff6b9d}
  .mv-nexus-status{display:flex;align-items:center;gap:8px}
  .mv-nexus-dot{width:8px;height:8px;border-radius:50%;animation:mv-pulse 2s infinite}
  .mv-nexus-violet .mv-nexus-dot{background:#a894ff}
  .mv-nexus-teal .mv-nexus-dot{background:#4ecdc4}
  .mv-nexus-rose .mv-nexus-dot{background:#ff6b9d}
  .mv-nexus-bar-track{height:6px;border-radius:999px;background:rgba(255,255,255,.04);overflow:hidden;margin-bottom:10px}
  .mv-nexus-bar{height:100%;border-radius:999px;background:currentColor;transition:width .6s cubic-bezier(.16,1,.3,1)}
  .mv-nexus-violet .mv-nexus-bar{background:linear-gradient(90deg,#a894ff,rgba(168,148,255,.4))}
  .mv-nexus-teal .mv-nexus-bar{background:linear-gradient(90deg,#4ecdc4,rgba(78,205,196,.4))}
  .mv-nexus-rose .mv-nexus-bar{background:linear-gradient(90deg,#ff6b9d,rgba(255,107,157,.4))}
  .mv-nexus-foot{display:flex;justify-content:space-between}

  /* Assets */
  .mv-assets-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px}
  .mv-assets-title{font-family:var(--font-serif);font-weight:400;font-size:26px;color:var(--mv-ivory);margin:0}
  .mv-assets-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  @media(max-width:1100px){.mv-assets-grid{grid-template-columns:1fr 1fr}}
  @media(max-width:720px){.mv-assets-grid{grid-template-columns:1fr}}
  .mv-asset-card{padding:24px;border-radius:22px;border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.02);backdrop-filter:blur(20px);transition:transform .4s,border-color .4s;display:flex;flex-direction:column;gap:14px}
  .mv-asset-card:hover{transform:translateY(-2px);border-color:rgba(189,235,52,.15)}
  .mv-asset-head{display:flex;justify-content:space-between;align-items:flex-start}
  .mv-asset-chip{width:44px;height:44px;border-radius:14px;border:1px solid;display:inline-flex;align-items:center;justify-content:center}
  .mv-asset-status{display:inline-flex;align-items:center;gap:8px;padding:5px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.08)}
  .mv-asset-live{border-color:rgba(189,235,52,.25);background:rgba(189,235,52,.06)}
  .mv-asset-name{font-family:var(--font-serif);font-weight:400;font-size:22px;letter-spacing:-.02em;color:var(--mv-ivory);margin:0}
  .mv-asset-meta-row{display:flex;gap:32px;padding:14px 0;border-top:1px solid rgba(255,255,255,.05)}
  .mv-asset-cta{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);color:var(--mv-ivory);font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:auto}
  .mv-asset-cta:hover{background:var(--mv-primary);color:#000;border-color:var(--mv-primary);box-shadow:0 0 20px rgba(189,235,52,.25)}

  /* Hydra chat rail */
  .mv-hydra{border-left:1px solid rgba(255,255,255,.05);background:linear-gradient(180deg,rgba(10,10,15,.9),rgba(10,10,15,.7));backdrop-filter:blur(25px);display:flex;flex-direction:column;height:100vh;position:sticky;top:0}
  .mv-hydra-head{padding:20px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.05)}
  .mv-hydra-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
  .mv-msg{display:flex;gap:10px;max-width:88%}
  .mv-msg-user{margin-left:auto;flex-direction:row-reverse}
  .mv-msg-avatar{width:30px;height:30px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(78,205,196,.12);border:1px solid rgba(78,205,196,.25);color:#4ecdc4;font-family:var(--font-serif);font-size:18px}
  .mv-msg-bubble{padding:12px 14px;border-radius:16px;font-size:13px;line-height:1.55;color:rgba(250,252,232,.88);font-weight:300}
  .mv-msg-assistant .mv-msg-bubble{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-top-left-radius:6px}
  .mv-msg-user .mv-msg-bubble{background:rgba(189,235,52,.08);border:1px solid rgba(189,235,52,.2);color:var(--mv-ivory);border-top-right-radius:6px}
  .mv-typing{display:flex;gap:4px;align-items:center}
  .mv-typing span{width:6px;height:6px;border-radius:50%;background:var(--mv-primary);opacity:.3;animation:mv-bounce 1.2s infinite}
  .mv-typing span:nth-child(2){animation-delay:.15s}
  .mv-typing span:nth-child(3){animation-delay:.3s}
  @keyframes mv-bounce{0%,80%,100%{opacity:.3;transform:translateY(0)}40%{opacity:1;transform:translateY(-3px)}}
  .mv-hydra-input{padding:16px;border-top:1px solid rgba(255,255,255,.05);display:flex;gap:8px;align-items:center}
  .mv-hydra-input input{flex:1;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px 14px;color:var(--mv-ivory);font-family:var(--font-sans);font-weight:300;font-size:13px;outline:none;transition:all .3s}
  .mv-hydra-input input:focus{border-color:var(--mv-primary);box-shadow:0 0 0 3px rgba(189,235,52,.08)}
  .mv-send{width:42px;height:42px;border-radius:14px;background:var(--mv-primary);color:#000;border:none;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 0 20px rgba(189,235,52,.25)}
  .mv-send:hover{background:#cfff3a}
</style>
</head>
<body>
<div id="app"></div>

<script type="text/babel" src="BrandHeader.jsx"></script>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="AgentNexus.jsx"></script>
<script type="text/babel" src="AssetCard.jsx"></script>
<script type="text/babel" src="HydraChat.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const ASSETS = [
  { id:1, name:'Multiversa Landing', type:'Web App · Next.js', status:'Active', icon:'globe', color:'#BDEB34', sessions:'1,284', conv:'4.8%' },
  { id:2, name:'Neural Chatbot', type:'AI Agent · Hydra', status:'Active', icon:'brain', color:'#4ecdc4', sessions:'3,102', conv:'12.3%' },
  { id:3, name:'Sales Funnel', type:'Marketing · n8n', status:'Draft', icon:'filter', color:'#FF9F5A', sessions:'—', conv:'—' }
];

function App(){
  const [collapsed, setCollapsed] = useState(false);
  const [selected, setSelected] = useState('dashboard');
  const [model, setModel] = useState('auto');

  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });

  return (
    <div className={`mv-shell ${collapsed?'mv-shell-collapsed':''}`}>
      <Sidebar collapsed={collapsed} onToggle={()=>setCollapsed(c=>!c)} selected={selected} onSelect={setSelected} assets={ASSETS}/>
      <div className="mv-main">
        <BrandHeader brand="Multiversa" user="Moshé @ Multiversa" model={model} onModelChange={setModel}/>
        <div className="mv-workspace">
          <header className="mv-page-head">
            <div>
              <div className="mv-mono-label" style={{color:'rgba(250,252,232,.5)'}}>Dashboard · Growth Lab</div>
              <h1 className="mv-page-title" style={{marginTop:8}}>Your business,<br/><em>orchestrated.</em></h1>
            </div>
            <div className="mv-page-kpis">
              <div><div className="mv-kpi-lbl">Active Assets</div><div className="mv-kpi-val">3 <em>live</em></div></div>
              <div><div className="mv-kpi-lbl">Memory Layers</div><div className="mv-kpi-val">L1–L4</div></div>
              <div><div className="mv-kpi-lbl">Node</div><div className="mv-kpi-val">NANO<em>BANANA</em></div></div>
            </div>
          </header>

          <AgentNexus/>

          <section>
            <div className="mv-assets-head">
              <div>
                <div className="mv-mono-label" style={{color:'rgba(250,252,232,.5)'}}>Live Assets</div>
                <h2 className="mv-assets-title" style={{marginTop:6}}>Fleet<em style={{fontStyle:'italic',color:'var(--mv-primary)',opacity:.7}}> at work.</em></h2>
              </div>
              <button className="mv-icon-btn" style={{width:'auto',padding:'0 14px',gap:8,display:'inline-flex'}}>
                <i data-lucide="plus" style={{width:14,height:14}}/>
                <span className="mv-mono-label" style={{fontSize:9,color:'var(--mv-ivory)'}}>New Asset</span>
              </button>
            </div>
            <div className="mv-assets-grid">
              {ASSETS.map(a => <AssetCard key={a.id} asset={a}/>)}
            </div>
          </section>
        </div>
      </div>
      <HydraChat model={model}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
