<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Multiversa — Landing</title>
<link rel="icon" href="../../assets/favicon.svg">
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *{box-sizing:border-box}
  body{margin:0}
  .mv-container{max-width:1420px;margin:0 auto;padding:0 24px}
  @media(min-width:640px){.mv-container{padding:0 48px}}
  @media(min-width:1024px){.mv-container{padding:0 80px}}

  /* Hero */
  .mv-hero{position:relative;min-height:90vh;display:flex;align-items:center;overflow:hidden;padding:96px 0 128px}
  .mv-hero-bg{position:absolute;inset:0;background:
    radial-gradient(800px 500px at 15% 25%,rgba(189,235,52,.18),transparent 55%),
    radial-gradient(600px 400px at 85% 70%,rgba(168,148,255,.12),transparent 55%),
    #0A0A0F;
    background-size:50px 50px,50px 50px,auto;z-index:0}
  .mv-hero-bg::after{content:"";position:absolute;inset:0;background-image:
    linear-gradient(to right,rgba(189,235,52,.03) 1px,transparent 1px),
    linear-gradient(to bottom,rgba(189,235,52,.03) 1px,transparent 1px);
    background-size:50px 50px}
  .mv-hero-scrim-top{position:absolute;inset:0;z-index:1;background:linear-gradient(to bottom,rgba(0,0,0,.75),rgba(0,0,0,.3) 50%,transparent);pointer-events:none}
  .mv-hero-scrim-bot{position:absolute;inset:0;z-index:2;background:linear-gradient(to top,#0A0A0F,transparent 60%);pointer-events:none}
  .mv-hero-inner{position:relative;z-index:10;max-width:1020px}
  .mv-h1-hero{font-family:var(--font-serif);font-weight:400;font-size:clamp(3rem,8vw,7rem);line-height:.88;letter-spacing:-.04em;color:var(--mv-ivory);margin:0 0 32px;text-shadow:0 0 40px rgba(189,235,52,.1)}
  .mv-h1-hero em{font-style:italic;font-weight:300;color:var(--mv-primary);opacity:.65}
  .mv-bullets{list-style:none;padding:0;margin:0 0 48px;max-width:640px}
  .mv-bullets li{display:flex;align-items:flex-start;gap:14px;padding:6px 0;color:rgba(255,255,255,.7);font-weight:300;font-size:16px;line-height:1.5}
  .mv-bullet-dot{flex-shrink:0;width:6px;height:6px;border-radius:50%;background:var(--mv-primary);margin-top:8px}
  .mv-hero-ctas{display:flex;gap:16px;flex-wrap:wrap}

  /* Pills & Buttons */
  .mv-pill{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;border:1px solid rgba(189,235,52,.2);background:rgba(189,235,52,.05);backdrop-filter:blur(20px)}
  .mv-dot{width:6px;height:6px;border-radius:50%;background:var(--mv-primary);animation:mv-pulse 2s ease-in-out infinite}
  @keyframes mv-pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .mv-mono-label{font-family:var(--font-mono);font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--mv-primary)}
  .mv-mono-meta{font-family:var(--font-mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.4)}

  .mv-btn-primary{height:60px;padding:0 32px;border-radius:999px;background:var(--mv-primary);color:#000;border:none;font-weight:700;font-size:17px;font-family:var(--font-sans);display:inline-flex;align-items:center;gap:10px;cursor:pointer;box-shadow:0 0 30px rgba(189,235,52,.3);transition:all .25s}
  .mv-btn-primary:hover{transform:scale(1.03);background:#cfff3a}
  .mv-btn-glass{height:60px;padding:0 32px;border-radius:999px;background:rgba(255,255,255,.05);color:var(--mv-ivory);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(20px);font-size:17px;font-weight:300;font-family:var(--font-sans);display:inline-flex;align-items:center;gap:12px;cursor:pointer;transition:all .25s}
  .mv-btn-glass:hover{background:rgba(255,255,255,.08)}

  /* Sections */
  .mv-section{padding:128px 0;position:relative}
  .mv-h-section{font-family:var(--font-serif);font-weight:400;font-size:clamp(2.5rem,5.5vw,5rem);letter-spacing:-.04em;line-height:.9;color:#fff;margin:0}
  .mv-h-section em{font-style:italic;font-weight:300;color:var(--mv-primary)}
  .mv-lead{font-family:var(--font-sans);font-weight:300;color:#71717A;font-size:18px;line-height:1.6;margin:0}

  /* Triad */
  .mv-triad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:32px}
  @media(max-width:900px){.mv-triad-grid{grid-template-columns:1fr}}
  .mv-agent-card{position:relative;border-radius:24px;border:1px solid;padding:32px;backdrop-filter:blur(20px);transition:transform .5s}
  .mv-agent-card:hover{transform:scale(1.02)}
  .mv-agent-violet{background:rgba(168,148,255,.06);border-color:rgba(168,148,255,.2);box-shadow:0 0 40px rgba(168,148,255,.12)}
  .mv-agent-teal{background:rgba(78,205,196,.06);border-color:rgba(78,205,196,.2);box-shadow:0 0 40px rgba(78,205,196,.12)}
  .mv-agent-rose{background:rgba(255,107,157,.06);border-color:rgba(255,107,157,.2);box-shadow:0 0 40px rgba(255,107,157,.12)}
  .mv-agent-sym{font-family:var(--font-serif);font-size:52px;line-height:1;margin-bottom:20px;opacity:.85}
  .mv-agent-violet .mv-agent-sym{color:#a894ff}
  .mv-agent-teal .mv-agent-sym{color:#4ecdc4}
  .mv-agent-rose .mv-agent-sym{color:#ff6b9d}
  .mv-agent-name{font-family:var(--font-serif);font-weight:400;font-size:30px;color:#fff;margin:0 0 6px;letter-spacing:-.02em}
  .mv-agent-role{font-family:var(--font-mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:rgba(189,235,52,.6);margin-bottom:24px}
  .mv-agent-desc{font-size:14px;color:#71717A;line-height:1.6;font-weight:300;margin:0 0 28px}
  .mv-agent-status{display:flex;align-items:center;gap:8px}
  .mv-agent-dot{width:8px;height:8px;border-radius:50%;animation:mv-pulse 2s infinite}
  .mv-agent-violet .mv-agent-dot{background:#a894ff}
  .mv-agent-teal .mv-agent-dot{background:#4ecdc4}
  .mv-agent-rose .mv-agent-dot{background:#ff6b9d}
  .mv-principle{display:inline-block;padding:12px 28px;border-radius:999px;border:1px solid rgba(189,235,52,.2);background:rgba(189,235,52,.05);font-family:var(--font-serif);font-style:italic;color:rgba(250,252,232,.8);font-size:15px}

  /* Tier cards */
  .mv-tier-scroll{overflow-x:auto;padding:32px 0;scrollbar-width:none}
  .mv-tier-scroll::-webkit-scrollbar{display:none}
  .mv-tier-row{display:flex;gap:24px;padding:0 24px;min-width:max-content}
  @media(min-width:1024px){.mv-tier-row{padding:0 max(2rem,calc((100vw - 1420px)/2 + 5rem))}}
  .mv-tier-card{position:relative;flex-shrink:0;width:320px;border-radius:24px;border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.02);padding:32px;backdrop-filter:blur(20px)}
  .mv-tier-highlight{border-color:rgba(189,235,52,.5);background:rgba(189,235,52,.03);box-shadow:0 0 60px rgba(189,235,52,.08);padding-top:40px}
  .mv-tier-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);padding:6px 16px;background:var(--mv-primary);color:#000;font-family:var(--font-mono);font-size:9px;font-weight:900;letter-spacing:.2em;text-transform:uppercase;border-radius:999px;box-shadow:0 4px 20px rgba(189,235,52,.4)}
  .mv-tier-head{display:flex;align-items:center;gap:16px;margin-bottom:28px}
  .mv-chip{width:48px;height:48px;border-radius:16px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.7)}
  .mv-chip-primary{border-color:rgba(189,235,52,.2);background:rgba(189,235,52,.1);color:var(--mv-primary)}
  .mv-chip-teal{border-color:rgba(78,205,196,.2);background:rgba(78,205,196,.1);color:#4ecdc4}
  .mv-chip-violet{border-color:rgba(168,148,255,.2);background:rgba(168,148,255,.1);color:#a894ff}
  .mv-tier-name{font-family:var(--font-serif);font-size:26px;color:#fff;margin:0 0 6px;letter-spacing:-.02em}
  .mv-tier-price{font-family:var(--font-mono);font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:rgba(189,235,52,.75);margin-bottom:16px}
  .mv-tier-highlight .mv-tier-price{color:var(--mv-primary)}
  .mv-jtbd{border-left:2px solid rgba(255,255,255,.1);padding-left:12px;font-size:12px;font-style:italic;color:rgba(255,255,255,.4);margin-bottom:16px;line-height:1.6}
  .mv-tier-desc{font-size:14px;color:#71717A;line-height:1.6;font-weight:300;margin:0 0 24px}
  .mv-feature-list{list-style:none;padding:0;margin:0 0 32px}
  .mv-feature-list li{display:flex;align-items:center;gap:12px;padding:4px 0;font-size:13px;color:rgba(255,255,255,.6);font-weight:300}
  .mv-feature-list .mv-bullet-dot{margin-top:0}
  .mv-btn-tier{width:100%;padding:14px;border-radius:16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#fff;font-family:var(--font-mono);font-size:10px;font-weight:900;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:all .25s}
  .mv-btn-tier:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2)}
  .mv-btn-tier:active{transform:scale(.97)}
  .mv-btn-tier-primary{background:var(--mv-primary);color:#000;border:none;box-shadow:0 0 30px rgba(189,235,52,.3)}
  .mv-btn-tier-primary:hover{background:#fff;box-shadow:0 0 40px rgba(255,255,255,.2)}

  /* Benchmark */
  .mv-bench-wrap{border-radius:24px;border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.02);backdrop-filter:blur(20px);overflow:auto}
  .mv-bench{width:100%;border-collapse:collapse;text-align:left}
  .mv-bench th{padding:24px;font-family:var(--font-mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#71717A;background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.05);text-align:center}
  .mv-bench-head-feat{text-align:left !important;background:rgba(255,255,255,.02)}
  .mv-bench-head-spark{color:var(--mv-primary) !important;background:rgba(189,235,52,.05) !important}
  .mv-bench td{padding:24px;font-size:11px;color:rgba(255,255,255,.5);text-align:center;font-weight:300;border-bottom:1px solid rgba(255,255,255,.02)}
  .mv-bench tr:hover td{background:rgba(255,255,255,.01)}
  .mv-bench-feat{text-align:left !important;color:rgba(255,255,255,.7) !important;background:rgba(255,255,255,.01);font-weight:500 !important}
  .mv-bench-spark{color:#fff !important;font-weight:700 !important;background:rgba(189,235,52,.02)}

  /* Footer */
  .mv-footer-wrap{background:#050505;padding:128px 0 40px;border-top:1px solid rgba(255,255,255,.05);overflow:hidden}
  .mv-footer-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:48px;margin-bottom:80px}
  @media(max-width:900px){.mv-footer-grid{grid-template-columns:1fr}}
  .mv-footer-h{font-family:var(--font-serif);font-size:18px;color:#fff;margin:0 0 24px}
  .mv-footer-links{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:16px}
  .mv-footer-links a{color:#71717A;font-family:var(--font-serif);font-size:14px;cursor:pointer;transition:color .2s}
  .mv-footer-links a:hover{color:var(--mv-primary)}
  .mv-social{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;color:#71717A;cursor:pointer;transition:all .2s}
  .mv-social:hover{color:#fff;background:rgba(255,255,255,.1)}
  .mv-footer-bar{padding-top:32px;border-top:1px solid rgba(255,255,255,.05);display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#444;font-family:var(--font-serif);flex-wrap:wrap;gap:16px}
  .mv-chrome-strip{margin-top:80px;text-align:center;font-family:var(--font-serif);font-weight:700;font-size:12vw;letter-spacing:-.04em;line-height:1;user-select:none;pointer-events:none;
    background:linear-gradient(120deg,rgba(255,255,255,.04) 0%,rgba(255,255,255,.12) 20%,rgba(189,235,52,.08) 35%,rgba(255,255,255,.18) 50%,rgba(168,148,255,.08) 65%,rgba(255,255,255,.1) 80%,rgba(255,255,255,.04) 100%);
    background-size:300% 300%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;animation:mv-chrome 8s ease infinite}
  @keyframes mv-chrome{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

  /* Nav */
  .mv-nav{position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);background:rgba(10,10,15,.7);border-bottom:1px solid rgba(255,255,255,.05)}
  .mv-nav-inner{max-width:1420px;margin:0 auto;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
  @media(min-width:640px){.mv-nav-inner{padding:16px 48px}}
  .mv-nav-links{display:flex;gap:28px;align-items:center}
  .mv-nav-links a{color:rgba(255,255,255,.6);font-family:var(--font-mono);font-size:11px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:color .2s}
  .mv-nav-links a:hover{color:var(--mv-primary)}
</style>
</head>
<body>
<div id="app"></div>

<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Triad.jsx"></script>
<script type="text/babel" src="PricingLadder.jsx"></script>
<script type="text/babel" src="Benchmark.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
function Nav(){
  return (
    <nav className="mv-nav">
      <div className="mv-nav-inner">
        <img src="../../assets/Logotipo.svg" alt="Multiversa" style={{height:28}}/>
        <div className="mv-nav-links">
          <a>The Triad</a><a>Pricing</a><a>Docs</a>
          <button className="mv-btn-primary" style={{height:40,padding:'0 18px',fontSize:12}}>Join</button>
        </div>
      </div>
    </nav>
  );
}

function App(){
  const [ready,setReady] = React.useState(false);
  React.useEffect(()=>{
    const t = setTimeout(()=>{
      if(window.lucide) window.lucide.createIcons();
      setReady(true);
    },50);
    return ()=>clearTimeout(t);
  },[]);
  React.useEffect(()=>{
    if(ready && window.lucide) window.lucide.createIcons();
  });
  return (
    <>
      <Nav/>
      <Hero/>
      <Triad/>
      <PricingLadder/>
      <Benchmark/>
      <Footer/>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
