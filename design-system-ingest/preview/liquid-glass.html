<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;background:var(--mv-background);overflow:hidden;color:var(--mv-ivory);font-family:var(--font-sans)}
  .bg{position:absolute;inset:0;background:
    radial-gradient(600px 400px at 20% 30%,rgba(189,235,52,.12),transparent),
    radial-gradient(500px 350px at 80% 70%,rgba(168,148,255,.1),transparent),
    var(--mv-background)}
  .wrap{position:relative;padding:28px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;height:100%;box-sizing:border-box;align-content:center}
  .card{border-radius:20px;padding:18px;min-height:150px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
  .a{backdrop-filter:blur(20px);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);box-shadow:0 8px 32px rgba(0,0,0,.37)}
  .b{backdrop-filter:blur(25px);background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);box-shadow:0 20px 50px rgba(0,0,0,.5)}
  .c{backdrop-filter:blur(30px);background:rgba(189,235,52,.08);border:1px solid rgba(189,235,52,.2);box-shadow:0 0 40px rgba(189,235,52,.1)}
  .lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:rgba(250,252,232,.4)}
  .title{font-family:var(--font-serif);font-size:18px;color:var(--mv-ivory)}
  .c .title{color:var(--mv-primary)}
  .c .lbl{color:var(--mv-primary);opacity:.7}
</style></head><body>
<div class="bg"></div>
<div class="wrap">
  <div class="card a"><span class="lbl">liquid-glass</span><div><div class="title">Glass</div><span class="lbl" style="color:rgba(250,252,232,.55)">blur 20 · white/.05</span></div></div>
  <div class="card b"><span class="lbl">liquid-glass-pro</span><div><div class="title">Glass Pro</div><span class="lbl" style="color:rgba(250,252,232,.55)">blur 25 · white/.03</span></div></div>
  <div class="card c"><span class="lbl">liquid-glass-accent</span><div><div class="title">Accent</div><span class="lbl" style="color:var(--mv-primary);opacity:.6">blur 30 · primary/.1</span></div></div>
</div></body></html>
