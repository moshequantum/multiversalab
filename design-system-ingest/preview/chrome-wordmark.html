<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;background:#050505;overflow:hidden;color:var(--mv-ivory)}
  .wrap{padding:24px;display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;box-sizing:border-box;gap:8px;text-align:center}
  .mark{font-family:var(--font-serif);font-weight:700;font-size:12vw;letter-spacing:-.04em;line-height:1;
    background:linear-gradient(120deg,rgba(255,255,255,.04) 0%,rgba(255,255,255,.12) 20%,rgba(189,235,52,.08) 35%,rgba(255,255,255,.18) 50%,rgba(168,148,255,.08) 65%,rgba(255,255,255,.1) 80%,rgba(255,255,255,.04) 100%);
    background-size:300% 300%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;
    animation:cs 8s ease infinite;filter:drop-shadow(0 0 60px rgba(189,235,52,.06))}
  @keyframes cs{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  .meta{font-family:var(--font-mono);font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:rgba(250,252,232,.3)}
</style></head><body><div class="wrap">
  <div class="mark">MULTIVERSA</div>
  <span class="meta">Footer chrome · 8s ease loop</span>
</div></body></html>
