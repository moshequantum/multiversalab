<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;background:var(--mv-background);overflow:hidden}
  .wrap{padding:28px;display:grid;grid-template-columns:repeat(3,1fr);gap:18px;height:100%;box-sizing:border-box;align-content:center}
  .agent{position:relative;border-radius:24px;padding:24px;border:1px solid;backdrop-filter:blur(20px);display:flex;flex-direction:column;gap:10px;overflow:hidden}
  .agent .sym{font-family:var(--font-serif);font-size:42px;line-height:1;opacity:.85}
  .agent .name{font-family:var(--font-serif);font-size:22px;color:var(--mv-ivory)}
  .agent .role{font-family:var(--font-mono);font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:rgba(250,252,232,.45)}
  .agent .hex{font-family:var(--font-mono);font-size:11px;color:rgba(250,252,232,.7);margin-top:auto}
  .astur{background:rgba(168,148,255,.08);border-color:rgba(168,148,255,.25);box-shadow:0 0 40px rgba(168,148,255,.12)}
  .astur .sym{color:#a894ff}
  .aur{background:rgba(78,205,196,.08);border-color:rgba(78,205,196,.25);box-shadow:0 0 40px rgba(78,205,196,.12)}
  .aur .sym{color:#4ecdc4}
  .runa{background:rgba(255,107,157,.08);border-color:rgba(255,107,157,.25);box-shadow:0 0 40px rgba(255,107,157,.12)}
  .runa .sym{color:#ff6b9d}
</style></head><body><div class="wrap">
  <div class="agent astur"><div class="sym">◎</div><div class="role">Orchestrator</div><div class="name">Astursadeth</div><div class="hex">#a894ff · violet</div></div>
  <div class="agent aur"><div class="sym">⬡</div><div class="role">System</div><div class="name">Auréon</div><div class="hex">#4ecdc4 · teal</div></div>
  <div class="agent runa"><div class="sym">✦</div><div class="role">Interface</div><div class="name">Runa</div><div class="hex">#ff6b9d · rose</div></div>
</div></body></html>
