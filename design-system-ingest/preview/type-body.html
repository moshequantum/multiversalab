<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>

</style></head><body><div class="wrap">
  <div class="row"><div class="meta">Body LG · Sora 300</div><div class="sample muted" style="font-size:18px">CortexOS is your command Cockpit + agent team.</div></div>
  <div class="row"><div class="meta">Body · Sora 300</div><div class="sample muted" style="font-size:16px">Fleet of agents for less than the monthly cost of a senior employee.</div></div>
  <div class="row"><div class="meta">Body SM · Sora 300</div><div class="sample muted" style="font-size:14px">4-layer memory: your brand, operations, decisions — always present.</div></div>
  <div class="row"><div class="meta">Caption · Sora 400</div><div class="sample" style="font-size:12px">AI proposes, you decide.</div></div>
</div></body></html>
