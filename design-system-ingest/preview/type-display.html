<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;background:var(--mv-background);color:var(--mv-ivory);overflow:hidden}
  .wrap{padding:32px 40px;display:flex;flex-direction:column;gap:14px;height:100%;box-sizing:border-box;justify-content:center}
  .row{display:flex;align-items:baseline;gap:24px}
  .meta{font-family:var(--font-mono);font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:rgba(250,252,232,.35);width:160px;flex-shrink:0}
  .sample{font-family:var(--font-serif);color:var(--mv-ivory);line-height:1}
  .italic{font-style:italic;color:var(--mv-primary);font-weight:300}
</style></head><body><div class="wrap">
  <div class="row"><div class="meta">Display · Playfair 400</div><div class="sample" style="font-size:44px;letter-spacing:-.04em">The Triad.</div></div>
  <div class="row"><div class="meta">Display Italic · 500</div><div class="sample italic" style="font-size:36px;letter-spacing:-.03em">Activate your Cortex.</div></div>
  <div class="row"><div class="meta">H2 · Playfair 400</div><div class="sample" style="font-size:28px;letter-spacing:-.02em">Human <span class="italic" style="font-size:28px">Synergy</span></div></div>
  <div class="row"><div class="meta">H3 · Playfair 500</div><div class="sample" style="font-size:22px">Orchestrator · Solution Architect</div></div>
</div></body></html>
