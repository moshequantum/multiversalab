<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;background:var(--mv-background);overflow:hidden;color:var(--mv-ivory);font-family:var(--font-sans)}
  .wrap{padding:24px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px;height:100%;box-sizing:border-box;align-content:center}
  .panel{border-radius:18px;border:1px solid rgba(255,255,255,.06);position:relative;overflow:hidden;min-height:160px;padding:14px;display:flex;flex-direction:column;justify-content:flex-end}
  .g1{background-size:40px 40px;background-image:linear-gradient(to right,rgba(189,235,52,.05) 1px,transparent 1px),linear-gradient(to bottom,rgba(189,235,52,.05) 1px,transparent 1px)}
  .g2{background:linear-gradient(to b,rgba(0,0,0,.75),transparent 60%),radial-gradient(circle at 30% 20%,rgba(189,235,52,.2),transparent 40%),#0A0A0F}
  .g3{position:relative}
  .g3::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(189,235,52,.35),transparent);height:2px;top:40%;animation:s 4s linear infinite}
  @keyframes s{0%{top:0%;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:100%;opacity:0}}
  .lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--mv-primary)}
  .sub{font-family:var(--font-mono);font-size:8px;color:rgba(250,252,232,.4);letter-spacing:.15em;text-transform:uppercase;margin-top:3px}
</style></head><body><div class="wrap">
  <div class="panel g1"><span class="lbl">Grid pattern</span><span class="sub">50×50 · chartreuse/.03</span></div>
  <div class="panel g2"><span class="lbl">Hero scrim</span><span class="sub">radial glow + top-dim</span></div>
  <div class="panel g3"><span class="lbl">Scan line</span><span class="sub">2px · 4s linear loop</span></div>
</div></body></html>
