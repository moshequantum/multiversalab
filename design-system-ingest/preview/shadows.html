<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;background:var(--mv-background);overflow:hidden}
  .wrap{padding:32px;display:grid;grid-template-columns:repeat(4,1fr);gap:18px;height:100%;box-sizing:border-box;align-content:center}
  .c{background:#121217;border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:16px;aspect-ratio:1;display:flex;flex-direction:column;justify-content:flex-end}
  .lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(250,252,232,.55)}
  .val{font-family:var(--font-mono);font-size:9px;color:var(--mv-primary);margin-top:4px;line-height:1.3}
  .g1{box-shadow:0 8px 32px rgba(0,0,0,.37)}
  .g2{box-shadow:0 20px 50px rgba(0,0,0,.5)}
  .g3{box-shadow:0 0 30px rgba(189,235,52,.3);border-color:var(--mv-primary)}
  .g4{box-shadow:0 0 40px rgba(168,148,255,.15);border-color:rgba(168,148,255,.3)}
</style></head><body><div class="wrap">
  <div class="c g1"><div class="lbl">Glass</div><div class="val">0 8 32 / .37</div></div>
  <div class="c g2"><div class="lbl">Glass Pro</div><div class="val">0 20 50 / .5</div></div>
  <div class="c g3"><div class="lbl">Chartreuse CTA</div><div class="val">0 0 30 rgba(BDEB34,.3)</div></div>
  <div class="c g4"><div class="lbl">Agent Glow</div><div class="val">0 0 40 agent/.15</div></div>
</div></body></html>
