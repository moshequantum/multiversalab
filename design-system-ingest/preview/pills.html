<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;background:var(--mv-background);overflow:hidden;font-family:var(--font-sans)}
  .wrap{padding:32px;display:flex;flex-direction:column;gap:18px;height:100%;box-sizing:border-box;justify-content:center}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(250,252,232,.4);width:120px}
  .pill{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;font-family:var(--font-mono);font-size:10px;letter-spacing:.3em;text-transform:uppercase}
  .p1{border:1px solid rgba(189,235,52,.2);background:rgba(189,235,52,.05);color:var(--mv-primary)}
  .p2{border:1px solid rgba(168,148,255,.25);background:rgba(168,148,255,.08);color:#a894ff}
  .p3{border:1px solid rgba(78,205,196,.25);background:rgba(78,205,196,.08);color:#4ecdc4}
  .p4{border:1px solid rgba(255,107,157,.25);background:rgba(255,107,157,.08);color:#ff6b9d}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .step{padding:4px 14px;border-radius:999px;background:var(--mv-primary);color:#000;font-family:var(--font-mono);font-size:9px;font-weight:900;letter-spacing:.2em;text-transform:uppercase}
</style></head><body><div class="wrap">
  <div class="row"><span class="lbl">Live · primary</span><span class="pill p1"><span class="dot"></span>Multiversa: Live</span><span class="pill p1"><span class="dot"></span>The Triad</span></div>
  <div class="row"><span class="lbl">Agent status</span><span class="pill p2"><span class="dot"></span>Orchestrating</span><span class="pill p3"><span class="dot"></span>Building</span><span class="pill p4"><span class="dot"></span>Active</span></div>
  <div class="row"><span class="lbl">Scarcity badge</span><span class="step">Founder Circle</span><span class="step" style="background:#c9a84c">Premium</span></div>
</div></body></html>
