<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;background:var(--mv-background);color:var(--mv-ivory);overflow:hidden}
  .wrap{padding:32px;display:flex;flex-direction:column;gap:10px;height:100%;box-sizing:border-box;justify-content:center}
  .row{display:flex;align-items:center;gap:16px}
  .lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(250,252,232,.45);width:80px}
  .bar{background:var(--mv-primary);height:10px;border-radius:2px}
  .px{font-family:var(--font-mono);font-size:10px;color:rgba(250,252,232,.7);margin-left:8px}
</style></head><body><div class="wrap">
  <div class="row"><span class="lbl">Space 1</span><span class="bar" style="width:4px"></span><span class="px">4</span></div>
  <div class="row"><span class="lbl">Space 2</span><span class="bar" style="width:8px"></span><span class="px">8</span></div>
  <div class="row"><span class="lbl">Space 4</span><span class="bar" style="width:16px"></span><span class="px">16</span></div>
  <div class="row"><span class="lbl">Space 6</span><span class="bar" style="width:24px"></span><span class="px">24 · mobile gutter</span></div>
  <div class="row"><span class="lbl">Space 8</span><span class="bar" style="width:32px"></span><span class="px">32 · card gap</span></div>
  <div class="row"><span class="lbl">Space 12</span><span class="bar" style="width:48px"></span><span class="px">48 · tablet gutter</span></div>
  <div class="row"><span class="lbl">Space 16</span><span class="bar" style="width:64px"></span><span class="px">64</span></div>
  <div class="row"><span class="lbl">Space 24</span><span class="bar" style="width:96px"></span><span class="px">96</span></div>
  <div class="row"><span class="lbl">Space 32</span><span class="bar" style="width:128px"></span><span class="px">128 · section py</span></div>
</div></body></html>
