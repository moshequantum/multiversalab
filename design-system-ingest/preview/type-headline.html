<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;background:var(--mv-background);overflow:hidden}
  .wrap{padding:36px 48px;display:flex;flex-direction:column;justify-content:center;height:100%;box-sizing:border-box;gap:24px}
  h1{font-family:var(--font-serif);font-size:56px;color:var(--mv-ivory);line-height:.88;letter-spacing:-.04em;font-weight:400;margin:0;text-shadow:0 0 30px rgba(189,235,52,.15)}
  h1 em{font-style:italic;font-weight:300;color:var(--mv-primary);opacity:.8}
  .sub{font-family:var(--font-sans);color:rgba(250,252,232,.55);font-size:16px;font-weight:300;max-width:560px;line-height:1.5}
</style></head><body><div class="wrap">
  <h1>Your business, orchestrated.<br><em>Activate your Cortex.</em></h1>
  <p class="sub">Statement + poetic echo. Always two beats. Italic suffix in chartreuse @ opacity 0.6–0.8.</p>
</div></body></html>
