<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;background:var(--mv-background);overflow:hidden}
  .wrap{padding:24px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;height:100%;box-sizing:border-box;align-content:center}
  .s{position:relative;border-radius:16px;padding:16px;min-height:110px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--mv-border)}
  .s .lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:.25em;text-transform:uppercase}
  .s .name{font-family:var(--font-serif);font-size:16px;color:var(--mv-ivory);margin-top:6px}
  .s .hex{font-family:var(--font-mono);font-size:11px;margin-top:3px}
  .gold{background:#c9a84c}.gold .lbl,.gold .name,.gold .hex{color:#0A0A0F}
  .orange{background:#FF9F5A}.orange .lbl,.orange .name,.orange .hex{color:#0A0A0F}
  .destr{background:#FF453A}.destr .lbl,.destr .name,.destr .hex{color:#fff}
  .primdim{background:rgba(189,235,52,.1);border-color:rgba(189,235,52,.3)}
  .primdim .lbl{color:var(--mv-primary)}.primdim .name,.primdim .hex{color:var(--mv-primary)}
</style></head><body><div class="wrap">
  <div class="s gold"><span class="lbl">Premium · Pricing</span><div><div class="name">Gold</div><div class="hex">#c9a84c</div></div></div>
  <div class="s orange"><span class="lbl">Warm accent</span><div><div class="name">Orange</div><div class="hex">#FF9F5A</div></div></div>
  <div class="s destr"><span class="lbl">Destructive</span><div><div class="name">Red Alert</div><div class="hex">#FF453A</div></div></div>
  <div class="s primdim"><span class="lbl">Accent · Subtle</span><div><div class="name">Primary Dim</div><div class="hex">rgba(189,235,52,.1)</div></div></div>
</div></body></html>
