<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;background:var(--mv-background);overflow:hidden}
  .wrap{padding:24px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;height:100%;box-sizing:border-box}
  .swatch{position:relative;border-radius:16px;overflow:hidden;padding:16px;display:flex;flex-direction:column;justify-content:space-between;min-height:120px;border:1px solid var(--mv-border)}
  .swatch .lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:rgba(250,252,232,.5)}
  .swatch .name{font-family:var(--font-serif);font-size:18px;color:var(--mv-ivory);margin-top:8px}
  .swatch .hex{font-family:var(--font-mono);font-size:11px;color:rgba(250,252,232,.7);margin-top:4px}
  .chartreuse{background:var(--mv-primary);border-color:var(--mv-primary)}
  .chartreuse .name,.chartreuse .lbl,.chartreuse .hex{color:#0A0A0F}
  .chartreuse .lbl{opacity:.7}
  .bg{background:var(--mv-background)}
  .surface{background:var(--mv-surface)}
  .carbon{background:var(--mv-carbon-light)}
  .ivory{background:var(--mv-ivory)}
  .ivory .name,.ivory .lbl,.ivory .hex{color:#0A0A0F}
  .ivory .lbl{opacity:.6}
  .footer{background:var(--mv-footer);border-color:rgba(255,255,255,.08)}
  .sand{background:var(--mv-sand)}
  .sand .name,.sand .lbl,.sand .hex{color:#0A0A0F}
</style></head>
<body><div class="wrap">
  <div class="swatch chartreuse"><span class="lbl">Primary · Hero</span><div><div class="name">Chartreuse</div><div class="hex">#BDEB34</div></div></div>
  <div class="swatch bg"><span class="lbl">Background · Deep</span><div><div class="name">Black Carbon</div><div class="hex">#0A0A0F</div></div></div>
  <div class="swatch surface"><span class="lbl">Surface · Cards</span><div><div class="name">Surface Carbon</div><div class="hex">#121217</div></div></div>
  <div class="swatch carbon"><span class="lbl">Muted · Alt rows</span><div><div class="name">Carbon Light</div><div class="hex">#1A1A20</div></div></div>
  <div class="swatch ivory"><span class="lbl">Text · Foreground</span><div><div class="name">Ivory Sand</div><div class="hex">#FAFCE8</div></div></div>
  <div class="swatch sand"><span class="lbl">Secondary text</span><div><div class="name">Sand</div><div class="hex">#B8B4AC</div></div></div>
  <div class="swatch footer"><span class="lbl">Abyssal · Footer</span><div><div class="name">Abyssal</div><div class="hex">#050505</div></div></div>
  <div class="swatch" style="background:var(--mv-muted)"><span class="lbl">Muted fg</span><div><div class="name">Zinc Muted</div><div class="hex">#71717A</div></div></div>
</div></body></html>
