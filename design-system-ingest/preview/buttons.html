<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  html,body{margin:0;height:100%;background:var(--mv-background);color:var(--mv-ivory);overflow:hidden;font-family:var(--font-sans)}
  .wrap{padding:32px;display:flex;flex-direction:column;gap:18px;height:100%;box-sizing:border-box;justify-content:center}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(250,252,232,.4);width:110px}
  .btn-primary{height:52px;padding:0 28px;border-radius:999px;background:var(--mv-primary);color:#000;border:none;font-weight:700;font-size:15px;display:inline-flex;align-items:center;gap:8px;cursor:pointer;box-shadow:0 0 30px rgba(189,235,52,.3)}
  .btn-glass{height:52px;padding:0 28px;border-radius:999px;background:rgba(255,255,255,.05);color:var(--mv-ivory);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(20px);font-size:15px;font-weight:300;display:inline-flex;align-items:center;gap:10px;cursor:pointer}
  .btn-tier{padding:14px 24px;border-radius:16px;background:var(--mv-primary);color:#000;font-family:var(--font-mono);font-size:10px;font-weight:900;letter-spacing:.2em;text-transform:uppercase;border:none;cursor:pointer;box-shadow:0 0 30px rgba(189,235,52,.3)}
  .btn-tier-alt{padding:14px 24px;border-radius:16px;background:rgba(255,255,255,.05);color:#fff;font-family:var(--font-mono);font-size:10px;font-weight:900;letter-spacing:.2em;text-transform:uppercase;border:1px solid rgba(255,255,255,.1);cursor:pointer}
  i.lx{width:18px;height:18px}
</style></head><body><div class="wrap">
  <div class="row"><span class="lbl">Hero · primary</span><button class="btn-primary">Try Cockpit Nano · 7 days <i data-lucide="arrow-right" class="lx"></i></button></div>
  <div class="row"><span class="lbl">Hero · glass</span><button class="btn-glass"><i data-lucide="terminal" class="lx" style="color:var(--mv-primary)"></i>Talk about Spark / Pulse</button></div>
  <div class="row"><span class="lbl">Tier CTA</span><button class="btn-tier">Join the Circle</button><button class="btn-tier-alt">Activate Pulse</button></div>
</div>
<script>lucide.createIcons();</script>
</body></html>
