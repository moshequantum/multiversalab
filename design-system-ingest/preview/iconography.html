<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  html,body{margin:0;height:100%;background:var(--mv-background);color:var(--mv-ivory);overflow:hidden}
  .wrap{padding:24px 32px;display:flex;flex-direction:column;gap:14px;height:100%;box-sizing:border-box;justify-content:center}
  .caption{font-family:var(--font-mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(250,252,232,.45)}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .chip{width:56px;height:56px;border-radius:16px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;color:var(--mv-primary);flex-direction:column;gap:4px}
  .chip i{width:22px;height:22px;stroke-width:1.75}
  .chip span{font-family:var(--font-mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:rgba(250,252,232,.4)}
  .triad{font-family:var(--font-serif);font-size:34px;line-height:1}
  .triad .v{color:#a894ff}.triad .t{color:#4ecdc4}.triad .r{color:#ff6b9d}
</style></head><body><div class="wrap">
  <div class="caption">Lucide · stroke 1.75 · rounded · no fill — the only icon system</div>
  <div class="row">
    <div class="chip"><i data-lucide="arrow-right"></i><span>arrow</span></div>
    <div class="chip"><i data-lucide="terminal"></i><span>terminal</span></div>
    <div class="chip"><i data-lucide="sparkles"></i><span>sparkles</span></div>
    <div class="chip"><i data-lucide="shield-check"></i><span>shield</span></div>
    <div class="chip"><i data-lucide="zap"></i><span>zap</span></div>
    <div class="chip"><i data-lucide="link-2"></i><span>link</span></div>
    <div class="chip"><i data-lucide="globe"></i><span>globe</span></div>
    <div class="chip"><i data-lucide="brain"></i><span>brain</span></div>
    <div class="chip"><i data-lucide="cpu"></i><span>cpu</span></div>
    <div class="chip"><i data-lucide="activity"></i><span>activity</span></div>
  </div>
  <div class="caption" style="margin-top:10px">Unicode — Triad glyphs (never substitute)</div>
  <div class="row" style="align-items:center;gap:28px">
    <div class="triad"><span class="v">◎</span> <span style="font-family:var(--font-mono);font-size:12px;letter-spacing:.2em;color:rgba(250,252,232,.5)">ASTURSADETH</span></div>
    <div class="triad"><span class="t">⬡</span> <span style="font-family:var(--font-mono);font-size:12px;letter-spacing:.2em;color:rgba(250,252,232,.5)">AURÉON</span></div>
    <div class="triad"><span class="r">✦</span> <span style="font-family:var(--font-mono);font-size:12px;letter-spacing:.2em;color:rgba(250,252,232,.5)">RUNA</span></div>
  </div>
</div>
<script>lucide.createIcons();</script>
</body></html>
