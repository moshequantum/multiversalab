<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;background:var(--mv-background);overflow:hidden;color:var(--mv-ivory);font-family:var(--font-sans)}
  .wrap{padding:32px;display:flex;flex-direction:column;gap:18px;height:100%;box-sizing:border-box;justify-content:center}
  .row{display:flex;gap:16px;align-items:center}
  .lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(250,252,232,.4);width:110px;flex-shrink:0}
  input{flex:1;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 16px;color:var(--mv-ivory);font-family:var(--font-sans);font-size:14px;font-weight:300;outline:none;transition:all .4s cubic-bezier(.16,1,.3,1)}
  input::placeholder{color:rgba(250,252,232,.3)}
  input:focus{border-color:var(--mv-primary);box-shadow:0 0 0 3px rgba(189,235,52,.08),0 0 20px -5px rgba(189,235,52,.15)}
  .focus{border-color:var(--mv-primary)!important;box-shadow:0 0 0 3px rgba(189,235,52,.08),0 0 20px -5px rgba(189,235,52,.15)}
  textarea{flex:1;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 16px;color:var(--mv-ivory);font-family:var(--font-sans);font-size:14px;min-height:60px;resize:none;outline:none}
</style></head><body><div class="wrap">
  <div class="row"><span class="lbl">Default</span><input placeholder="your@email.com"></div>
  <div class="row"><span class="lbl">Focus</span><input class="focus" value="moshe@multiversa.group"></div>
  <div class="row"><span class="lbl">Textarea</span><textarea placeholder="Tell us about your business…"></textarea></div>
</div></body></html>
