<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;background:var(--mv-background);overflow:hidden;color:var(--mv-ivory)}
  .wrap{padding:24px 32px;display:grid;grid-template-columns:1.2fr 1fr;gap:24px;height:100%;box-sizing:border-box;align-items:center}
  .box{border:1px solid rgba(255,255,255,.06);border-radius:18px;padding:20px;display:flex;flex-direction:column;gap:12px;justify-content:center;align-items:flex-start;height:100%;box-sizing:border-box}
  img{width:100%;height:auto;max-width:320px}
  .meta{font-family:var(--font-mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(250,252,232,.4)}
  .fav{width:88px;height:88px}
  .r{display:flex;gap:20px;align-items:center}
</style></head><body><div class="wrap">
  <div class="box">
    <span class="meta">Full wordmark · 635×140</span>
    <img src="../assets/Logotipo.svg" alt="Multiversa logo">
  </div>
  <div class="box">
    <span class="meta">Favicon · M mark</span>
    <div class="r"><img src="../assets/favicon.svg" class="fav" alt=""><div style="font-family:var(--font-serif);font-size:20px">Multiversa</div></div>
    <span class="meta" style="color:rgba(250,252,232,.3);font-size:8px">Gradient #EEF6E8 → #8C9088 · never re-color</span>
  </div>
</div></body></html>
