<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;background:var(--mv-background);overflow:hidden}
  .wrap{padding:24px;display:grid;grid-template-columns:repeat(6,1fr);gap:12px;height:100%;box-sizing:border-box;align-content:center}
  .r{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;min-height:100px;aspect-ratio:1}
  .lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(250,252,232,.55)}
  .px{font-family:var(--font-mono);font-size:10px;color:var(--mv-primary);margin-top:2px}
</style></head><body><div class="wrap">
  <div class="r" style="border-radius:4px"><span class="lbl">xs</span><span class="px">4px</span></div>
  <div class="r" style="border-radius:8px"><span class="lbl">sm</span><span class="px">8px</span></div>
  <div class="r" style="border-radius:12px"><span class="lbl">md · input</span><span class="px">12px</span></div>
  <div class="r" style="border-radius:16px"><span class="lbl">lg · btn</span><span class="px">16px</span></div>
  <div class="r" style="border-radius:24px"><span class="lbl">xl · card</span><span class="px">24px</span></div>
  <div class="r" style="border-radius:999px"><span class="lbl">pill</span><span class="px">full</span></div>
</div></body></html>
