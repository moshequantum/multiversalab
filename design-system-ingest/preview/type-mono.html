<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;height:100%;background:var(--mv-background);color:var(--mv-ivory);overflow:hidden}
  .wrap{padding:32px 40px;display:flex;flex-direction:column;gap:20px;height:100%;box-sizing:border-box;justify-content:center}
  .row{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  .meta{font-family:var(--font-mono);font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:rgba(250,252,232,.35);width:140px;flex-shrink:0}
  .mono{font-family:var(--font-mono);text-transform:uppercase;color:var(--mv-primary);font-size:10px;letter-spacing:.3em}
  .pill{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;border:1px solid rgba(189,235,52,.2);background:rgba(189,235,52,.05)}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--mv-primary)}
  .step{display:inline-flex;padding:4px 12px;background:var(--mv-primary);color:#000;font-family:var(--font-mono);font-size:9px;font-weight:900;letter-spacing:.2em;text-transform:uppercase;border-radius:999px}
  .meta2{font-family:var(--font-mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(250,252,232,.4)}
</style></head><body><div class="wrap">
  <div class="row"><div class="meta">Mono · micro</div><span class="mono">Multiversa: Growth Lab</span><span class="mono" style="color:rgba(250,252,232,.4)">STATUS: LIVE</span></div>
  <div class="row"><div class="meta">Status pill</div><span class="pill"><span class="dot"></span><span class="mono">The Triad</span></span></div>
  <div class="row"><div class="meta">Step badge</div><span class="step">Founder Circle</span><span class="step" style="background:transparent;border:1px solid rgba(255,255,255,.1);color:#fff">STEP 01</span></div>
  <div class="row"><div class="meta">Metadata</div><span class="meta2">NODE_ID · NANOBANANA</span><span class="meta2">ASSET_COUNT · 3 DESKTOP</span></div>
</div></body></html>
